<!DOCTYPE html>
<html>
    <head>
    </head>
    
    <body onload= "loadFile();" onresize="resize();">
        <script async type= "text/javascript" src="mowerScreen.js"></script>

        <table id="head" width="100%"  text-align="center" >
            <tr>
                <td ><img src="mowerScreen.png" width= "100%"/></td>
                <td >
                    <table> 
                       <tr> <td><img id="status" src="status-setup.png" width= "100%"/></td></tr>
                       <tr> <td><img id="exit" src="status-exit.png" width= "100%"/></td></tr>
                    </table>
                </td>
            </tr>
        </table>
        <table id="recording" width="100%"  text-align="center" style="display:none" >
            <tr>
                <td width= "30%">
                    <img id="status" src="recording/connexionOn.png" width= "100%"/>
                </td>
                <td width= "30%">
                    <img id="avance" src="recording/avance.png" width= "100%" onclick="moving('forward')"/>
                </td>
                <td width= "30%">
                    <table width="100%"> 
                        <tr><td colspan= "2é text-align="center"><font size="+3"><center><p id="objName">Obstacle / Jardin</p></center></font></td></tr>
                        <tr><td text-align="center"><font size="+3"><center><p id="objPoint">nbPoints: xxxx</p></center></font></td>
                        <td text-align="center"><font size="+3"><center><p id="objPosition">0, 0</p></center></font></td></tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td width= "30%">
                    <img id="droite" src="recording/gauche.png" width="100%" onclick="moving('right')"/>
                </td>
                <td width= "30%">
                    <img id="record" src="recording/start.png" width="100%" onclick="record()"/>
                </td>
                <td width= "30%">
                    <img id="gauche" src="recording/droite.png" width="100%" onclick="moving('left')"/>
                </td>
            </tr>
            <tr>
                <td id="points" width="30%">
                    <img id="avance" src="recording/exit.png" width= "100%" onclick="exit()"/>
                </td>
                <td width= "30%">
                    <img id="avance" src="recording/recule.png" width="100%" onclick="moving('backward')"/>
                </td>
                <td width= "30%">
                    <img src="recording/clear.png" width="100%" onclick="clean()"/> 
                </td>
            </tr>
        </table>

        <table width="100%" id="settings"  style="display:block">
            <tr valign="TOP" >
                <td width="10%">
                    <table id="connexion">
                        <tr>
                            <td> <img id="cnxStatus" src="connexionOff.png"> </img> </td><td>Robot connexion</td> 
                        </tr>
                        <tr id="portRow">
                            <td>Port</td><td>
                                <select id="usb" onfocus="getPorts()"> 
                                </select>
                            </td> 
                        </tr>
                        <tr id="baudRateRow">
                            <td>Baud rate</td><td>
                                <select id="baudrate"> 
                                    <option value="9600">9600</option>
                                    <option value="19200">19200</option>
                                    <option value="38400"selected>38400</option>
                                    <option value="57600">57600</option>
                                </select>
                            </td> 
                        </tr>
                        <tr>
                            <td><img id="cnxButton" src="open.png" onclick="openConnexion()"></img></td><td>Connexion</td> 
                        </tr>
                    </table>
                </td>
                <td rowspan="3">
                    <canvas width="1200" height="600" id="dessin"> </canvas>
                </td>
            </tr>
            <tr>
                <td width="15%">
                    <table id="Obstacles">
                        <tr><td colspan="2"><img src="garden.png" onclick="selectObs(-1)" size="80%"/> </td><td><img src="edit.png" onclick="edit('garden')"/></td></tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td>
                    <img id="add" src="add.png" onclick="addObstacle()"/>
                </td >
            </tr>
        </table>
    </body>
</HTML>
